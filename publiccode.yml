publiccodeYmlVersion: "0.5.0"

name: API van het OSS register
url: "https://github.com/developer-overheid-nl/don-oss-register"
landingURL: "https://oss.developer.overheid.nl"
softwareType: standalone/web
platforms:
  - web

categories:
  - collaboration
developmentStatus: beta

description:
  nl:
    shortDescription: >-
      API van het OSS register (oss.developer.overheid.nl)
    longDescription: |
      De API van het OSS-register maakt open source software van de overheid beter
      vindbaar en herbruikbaar. Via deze API kunnen organisaties, ontwikkelaars en
      dienstverleners actuele metadata over repositories ophalen en verwerken in
      eigen toepassingen.
    features:
      - Doorzoekbare catalogus van open source repositories


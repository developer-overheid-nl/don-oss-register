description:
  nl:
    shortDescription: >-
      API van het OSS register (oss.developer.overheid.nl)

    apiDocumentation: "https://apis.developer.overheid.nl/apis/kIDmDnHvg"

    longDescription: |
      De API van het OSS-register maakt open source software van de
      overheid beter vindbaar en herbruikbaar. Via deze API kunnen
      organisaties, ontwikkelaars en dienstverleners actuele metadata
      over repositories ophalen en verwerken in eigen toepassingen.

    features:
      - Doorzoekbare catalogus van open source repositories


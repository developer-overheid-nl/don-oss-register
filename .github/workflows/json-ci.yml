name: JSON CI

on:
  pull_request:
    paths:
      - '**/*.json'
      - '.github/workflows/json-ci.yml'

jobs:
  lint-and-validate:
    name: JSON Lint & OpenAPI Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure PR base branch ref is available for Super-Linter diff mode
        run: |
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
      - name: Run Super-Linter
        uses: super-linter/super-linter@v8
        env:
          DEFAULT_BRANCH: ${{ github.base_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_JSON: true
          VALIDATE_OPENAPI: true

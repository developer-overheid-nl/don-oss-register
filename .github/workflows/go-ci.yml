name: Go CI/CD

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/go-ci.yml'
  push:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: "go.mod"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: "go.mod"
      - name: Run tests
        run: |
          set -euo pipefail

          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage.txt

          coverage="$(awk '/^total:/ { gsub(/%/, "", $3); print $3 }' coverage.txt)"
          {
            echo "### Go coverage"
            echo
            echo "Total coverage: ${coverage}%"
            echo "Required minimum: 80.0%"
          } >> "$GITHUB_STEP_SUMMARY"

          awk -v coverage="$coverage" 'BEGIN {
            if (coverage + 0 < 80.0) {
              printf("coverage %.1f%% is below required 80.0%%\n", coverage)
              exit 1
            }
          }'
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.txt

  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ghcr.io/developer-overheid-nl/don-oss-register:latest
            ghcr.io/developer-overheid-nl/don-oss-register:${{ github.sha }}
